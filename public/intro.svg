                font-family: 'JetBrains Mono', 'Noto Sans SC', 'Noto Sans JP', sans-serif;
                font-weight: bold;
            }
        </style>
    </defs>
    <rect width="1280" height="640" fill="#f0f0f0" />
    <text x="60" y="100" fill="black" font-size="64" font-weight="bold">
